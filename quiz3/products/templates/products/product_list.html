<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>
</head>
<body>
    <h1>Products</h1>

    {% for product in products %}
        <p>{{ product.name }} - &#8369;{{ product.price|floatformat:"0" }}</p>
    {% empty %}
        <p>No products available.</p>
    {% endfor %}
</body>
</html>
